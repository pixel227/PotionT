<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Timer</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .timer-box {
            text-align: center;
            background: #121212;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #212121;
        }
        #timer {
            font-size: 56px;
            font-weight: bold;
            margin: 15px 0;
            color: #ffffff;
        }
        input {
            background: #212121;
            border: 2px solid #FF9900;
            color: white;
            padding: 10px;
            border-radius: 6px;
            width: 100px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            background-color: #FF9900;
            color: #000000;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn.reset {
            background-color: #212121;
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="timer-box">
    <input type="number" id="minutes" placeholder="Мин" min="1" value="5">
    <div id="timer">05:00</div>
    <div class="btn-group">
        <button class="btn" onclick="startTimer()">Start</button>
        <button class="btn reset" onclick="resetTimer()">Reset</button>
    </div>
</div>

<script>
    let countdown;
    let timeLeft = 0;

    function startTimer() {
        clearInterval(countdown);
        if (timeLeft === 0) {
            let mins = document.getElementById('minutes').value;
            timeLeft = (mins ? parseInt(mins) : 5) * 60;
        }
        document.getElementById('timer').style.color = '#ffffff';
        countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('timer').style.color = '#FF9900';
                document.getElementById('timer').innerText = "TIME'S UP";
                timeLeft = 0;
                return;
            }
            timeLeft--;
            updateDisplay();
        }, 1000);
    }

    function resetTimer() {
        clearInterval(countdown);
        timeLeft = 0;
        document.getElementById('timer').style.color = '#ffffff';
        let mins = document.getElementById('minutes').value;
        let m = (mins ? parseInt(mins) : 5).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:00`;
    }

    function updateDisplay() {
        let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        let s = (timeLeft % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
    }
</script>
</body>
</html>
